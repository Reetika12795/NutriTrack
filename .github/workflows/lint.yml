name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nutritrack
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check . --config pyproject.toml

      - name: Run ruff formatter check
        run: ruff format --check . --config pyproject.toml

  sql-lint:
    name: SQL Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nutritrack
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Lint SQL files
        run: sqlfluff lint sql/ --dialect postgres --exclude-rules LT12,LT02,ST06,AM04,RF04,CP02,CP01,LT01,ST07,AM05,RF06,RF02,LT05,LT08,AL01,AM03,CP03,LT14,AL03,CP05
