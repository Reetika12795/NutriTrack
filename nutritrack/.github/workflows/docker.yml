name: Docker Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API Dockerfile
        run: docker build -f api/Dockerfile -t nutritrack-api:test .

  build-app:
    name: Build App Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build App Dockerfile
        run: docker build -f app/Dockerfile -t nutritrack-app:test .

  build-airflow:
    name: Build Airflow Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Airflow Dockerfile
        run: docker build -f airflow/Dockerfile -t nutritrack-airflow:test .

  build-superset:
    name: Build Superset Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Superset Dockerfile
        run: docker build -f superset/Dockerfile -t nutritrack-superset:test .
