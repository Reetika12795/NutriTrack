site_name: NutriTrack — Nutritional Data Engineering Platform
site_description: End-to-end data engineering platform for nutritional data analysis
site_author: Reetika Kumar
site_url: https://reetika12795.github.io/NutriTrack/
repo_url: https://github.com/Reetika12795/NutriTrack
repo_name: Reetika12795/NutriTrack

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Reetika12795/NutriTrack

nav:
  - Home: index.md
  - Architecture:
    - System Overview: architecture/overview.md
    - Data Flow Pipeline: architecture/data-flow.md
    - Infrastructure: architecture/infrastructure.md
  - Data Warehouse:
    - Star Schema: data-warehouse/star-schema.md
    - ETL Pipelines: data-warehouse/etl-pipelines.md
    - SCD Implementation: data-warehouse/scd.md
    - Datamarts: data-warehouse/datamarts.md
  - Data Lake:
    - Medallion Architecture: data-lake/medallion.md
    - Data Catalog: data-lake/catalog.md
    - Governance & RGPD: data-lake/governance.md
  - API:
    - REST API Reference: api/reference.md
  - Monitoring:
    - Alerting System: monitoring/alerting.md
    - SLA Dashboard: monitoring/sla-dashboard.md
  - Certification:
    - Competency Matrix: certification/competency-matrix.md
    - Audit Report: certification/audit.md
